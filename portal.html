<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TFL Validation Portal — Sponsor Access</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root{
  --navy:#1a2332;--navy-light:#243044;--navy-dark:#141c28;
  --sidebar:#1e2a3a;--card-bg:#ffffff;--card-border:#e2e8f0;
  --text:#1e293b;--text-muted:#64748b;--text-light:#94a3b8;
  --accent:#2563eb;--accent-light:#3b82f6;
  --green:#16a34a;--green-bg:#dcfce7;--green-border:#86efac;
  --red:#dc2626;--red-bg:#fee2e2;--red-border:#fca5a5;
  --yellow:#ca8a04;--yellow-bg:#fef9c3;
  --bg:#f1f5f9;--white:#ffffff;
  --gold:#d97706;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* ===== TOP HEADER ===== */
.top-header{background:linear-gradient(135deg,var(--navy),var(--navy-light));padding:12px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--accent)}
.top-header .logo{display:flex;align-items:center;gap:12px}
.top-header .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center}
.top-header .logo-icon svg{width:20px;height:20px;fill:white}
.top-header h1{color:white;font-size:1.05rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase}
.top-header .logo-sub{color:#94a3b8;font-size:0.78rem;font-weight:400}
.header-right{display:flex;align-items:center;gap:12px}
.study-badge{background:var(--accent);color:white;padding:5px 14px;border-radius:6px;font-size:0.78rem;font-weight:700}
.date-badge{color:#94a3b8;font-size:0.78rem}
.conf-badge{background:#dc2626;color:white;padding:5px 14px;border-radius:6px;font-size:0.72rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase}

/* ===== TAB NAV ===== */
.tab-nav{background:var(--white);border-bottom:1px solid var(--card-border);padding:0 24px;display:flex;overflow-x:auto}
.tab-btn{padding:14px 20px;border:none;background:none;font-family:inherit;font-size:0.82rem;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab-btn:hover{color:var(--text);background:#f8fafc}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:#eff6ff}
.tab-btn .icon{font-size:0.9rem}
.tab-count{background:var(--accent);color:white;font-size:0.65rem;font-weight:700;padding:2px 7px;border-radius:10px;min-width:20px;text-align:center}
.tab-count.zero{background:#94a3b8}
.tab-count.green{background:var(--green)}

/* ===== VERSION TOGGLE ===== */
.version-bar{background:var(--white);border-bottom:1px solid var(--card-border);padding:8px 32px;display:flex;align-items:center;gap:12px}
.version-toggle{display:flex;border:2px solid var(--card-border);border-radius:8px;overflow:hidden}
.ver-btn{padding:6px 18px;border:none;background:none;font-family:inherit;font-size:0.78rem;font-weight:600;cursor:pointer;color:var(--text-muted);transition:all .15s}
.ver-btn.active{background:var(--accent);color:white}
.ver-btn:not(.active):hover{background:#f1f5f9}
.version-label{font-size:0.78rem;color:var(--text-muted)}

/* ===== MAIN CONTENT ===== */
.main{padding:24px 32px;max-width:1400px;margin:0 auto}

/* ===== STAT CARDS ===== */
.stat-cards{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--white);border:1px solid var(--card-border);border-radius:12px;padding:20px;border-left:4px solid var(--card-border)}
.stat-card.blue{border-left-color:var(--accent)}
.stat-card.green{border-left-color:var(--green)}
.stat-card.red{border-left-color:var(--red)}
.stat-card .card-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:8px}
.stat-card .card-num{font-size:2.2rem;font-weight:800;line-height:1;color:var(--text)}
.stat-card.green .card-num{color:var(--green)}
.stat-card.red .card-num{color:var(--red)}
.stat-card .card-sub{font-size:0.75rem;color:var(--text-light);margin-top:4px}

/* ===== PROGRESS BAR ===== */
.progress-section{background:var(--white);border:1px solid var(--card-border);border-radius:12px;padding:20px 24px;margin-bottom:24px}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.progress-header h3{font-size:0.9rem;font-weight:700}
.progress-pct{font-size:1.1rem;font-weight:800;color:var(--accent)}
.progress-track{height:24px;background:#e2e8f0;border-radius:12px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:12px;display:flex;align-items:center;justify-content:flex-end;padding-right:12px;font-size:0.72rem;font-weight:700;color:white;transition:width 1.5s ease-out}
.progress-fill.all-pass{background:linear-gradient(90deg,#22c55e,#4ade80)}
.progress-fill.mixed{background:linear-gradient(90deg,#22c55e 85%,#ef4444)}
.progress-legend{display:flex;gap:16px;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--text-muted)}
.legend-dot{width:10px;height:10px;border-radius:50%}
.legend-dot.green{background:var(--green)}
.legend-dot.red{background:#ef4444}

/* ===== TFL RESULTS TABLE ===== */
.section-title{font-size:1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title .icon{font-size:1.1rem}
.results-table{width:100%;background:var(--white);border:1px solid var(--card-border);border-radius:12px;overflow:hidden;border-collapse:separate;border-spacing:0}
.results-table thead th{background:#f8fafc;padding:12px 16px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);text-align:left;border-bottom:2px solid var(--card-border);position:sticky;top:0}
.results-table thead th:first-child{border-left:4px solid transparent}
.results-table tbody tr{cursor:pointer;transition:background .1s}
.results-table tbody tr:hover{background:#f8fafc}
.results-table tbody tr:not(:last-child) td{border-bottom:1px solid #f1f5f9}
.results-table tbody td{padding:14px 16px;font-size:0.85rem}
.results-table tbody tr td:first-child{border-left:4px solid var(--green);font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace,system-ui}
.results-table tbody tr.fail td:first-child{border-left-color:var(--red)}
.results-table .type-badge{display:inline-block;padding:3px 10px;border-radius:5px;font-size:0.72rem;font-weight:600;background:#f1f5f9;color:var(--text-muted)}
.results-table .ds-badge{font-weight:600;color:var(--accent);font-size:0.82rem}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:6px;font-size:0.72rem;font-weight:700}
.status-badge.pass{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.status-badge.fail{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.status-badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.checks-text{font-size:0.82rem;color:var(--text-muted)}
.checks-text span{font-weight:700;color:var(--text)}
.match-rate{font-weight:800;font-size:0.9rem}
.match-rate.full{color:var(--green)}
.match-rate.partial{color:var(--gold)}

/* ===== DETAIL PANEL ===== */
.detail-row{display:none}
.detail-row.open{display:table-row}
.detail-row td{padding:0 !important;border-left:4px solid var(--accent) !important;background:#f8fafc}
.detail-inner{padding:16px 24px}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:6px}
.detail-item{display:flex;justify-content:space-between;padding:8px 14px;border-radius:6px;font-size:0.8rem;background:var(--white);border:1px solid #e2e8f0}
.detail-item.pass{border-left:3px solid var(--green)}
.detail-item.fail{border-left:3px solid var(--red)}
.detail-item .d-label{color:var(--text-muted);max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.detail-item .d-vals{font-weight:600;font-family:'JetBrains Mono',monospace,system-ui;font-size:0.78rem}
.detail-item.pass .d-vals{color:var(--green)}
.detail-item.fail .d-vals{color:var(--red)}
.detail-note{margin-top:8px;font-size:0.75rem;color:var(--text-light);font-style:italic}

/* ===== AUDIT TAB ===== */
.audit-panel{background:var(--white);border:1px solid var(--card-border);border-radius:12px;padding:24px}
.audit-entry{padding:10px 16px;border-left:3px solid var(--accent);background:#f8fafc;border-radius:0 6px 6px 0;margin-bottom:6px;font-size:0.82rem}
.audit-entry .a-time{color:var(--text-light);font-size:0.72rem}
.audit-entry .a-msg{margin-top:2px}

/* ===== COMPARISON TABLE (for Protocol/SAP, SAS Programs tabs) ===== */
.info-panel{background:var(--white);border:1px solid var(--card-border);border-radius:12px;padding:32px;text-align:center}
.info-panel h3{font-size:1.1rem;margin-bottom:8px}
.info-panel p{color:var(--text-muted);font-size:0.9rem;line-height:1.6}
.tier-table{width:100%;max-width:700px;margin:24px auto 0;border-collapse:collapse;font-size:0.85rem;text-align:left}
.tier-table th,.tier-table td{padding:10px 16px;border-bottom:1px solid var(--card-border)}
.tier-table th{color:var(--text-muted);font-weight:600;text-transform:uppercase;font-size:0.72rem;letter-spacing:0.04em}
.tier-table .check{color:var(--green);font-weight:700}
.tier-table .dash{color:var(--text-light)}

@media(max-width:900px){
  .stat-cards{grid-template-columns:repeat(3,1fr)}
  .detail-grid{grid-template-columns:1fr}
  .main{padding:16px}
}
@media(max-width:600px){
  .stat-cards{grid-template-columns:repeat(2,1fr)}
  .top-header{padding:10px 16px}
  .tab-nav{padding:0 8px}
}
</style>
</head>

let currentVersion = 'pro';
let currentTab = 'dashboard';
let expandedRow = null;

const TABS = [
  {id:'dashboard',label:'Dashboard',icon:'📊'},
  {id:'tables',label:'TFL Results',icon:'📋',countKey:'tables'},
  {id:'listings',label:'Listings',icon:'📃',countKey:'listings'},
  {id:'audit',label:'Audit Trail',icon:'📁',countKey:'audit'},
  {id:'specs',label:'ADaM Specs',icon:'📐',countKey:'specs'},
  {id:'compare',label:'Free vs Pro',icon:'⚖️'},
];

function getStats(ver) {
  const d = DATA[ver];
  const r = d.results;
  const tables = r.filter(x => !x.id.startsWith('L-'));
  const listings = r.filter(x => x.id.startsWith('L-'));
  const totalChecks = r.reduce((a,x) => a + x.total, 0);
  const totalPass = r.reduce((a,x) => a + x.passed, 0);
  const tflPass = r.filter(x => x.status==='PASS').length;
  const tflFail = r.length - tflPass;
  const pct = totalChecks > 0 ? (totalPass/totalChecks*100) : 0;
  return {tables,listings,totalChecks,totalPass,tflPass,tflFail,pct,total:r.length,results:r,study:d.study};
}

function switchVersion(ver) {
  currentVersion = ver;
  expandedRow = null;
  document.querySelectorAll('.ver-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(ver)));
  render();
}

function switchTab(tab) {
  currentTab = tab;
  expandedRow = null;
  render();
}

function toggleRow(id) {
  expandedRow = expandedRow === id ? null : id;
  renderContent();
}

function render() {
  const s = getStats(currentVersion);
  // Header badges
  document.getElementById('studyBadge').textContent = 'Study: ' + s.study.study_id;
  const now = new Date();
  document.getElementById('dateBadge').textContent = now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) + ' ' + now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('versionDesc').textContent = currentVersion === 'pro'
    ? `CDISCPILOT01 — ${s.study.indication || s.study.phase} — ${s.total} TFLs, ${s.totalChecks} checks`
    : `Synthetic demo — ${s.total} TFLs, ${s.totalChecks} checks`;

  // Tabs
  const tabHtml = TABS.map(t => {
    let count = '';
    if (t.countKey === 'tables') count = s.tables.length;
    else if (t.countKey === 'listings') count = s.listings.length;
    else if (t.countKey === 'audit') count = s.totalChecks;
    else if (t.countKey === 'specs') count = s.results.length * 3;
    const countBadge = count !== '' ? `<span class="tab-count${count==0?' zero':''}">${count}</span>` : '';
    const active = currentTab === t.id ? ' active' : '';
    return `<button class="tab-btn${active}" onclick="switchTab('${t.id}')"><span class="icon">${t.icon}</span>${t.label}${countBadge}</button>`;
  }).join('');
  document.getElementById('tabNav').innerHTML = tabHtml;

  renderContent();
}

function renderContent() {
  const s = getStats(currentVersion);
  let html = '';

  if (currentTab === 'dashboard') {
    html = renderDashboard(s);
  } else if (currentTab === 'tables') {
    html = renderResultsTable(s.tables, 'Table Results');
  } else if (currentTab === 'listings') {
    html = renderResultsTable(s.listings, 'Listing Results');
  } else if (currentTab === 'audit') {
    html = renderAudit(s);
  } else if (currentTab === 'specs') {
    html = renderSpecs(s);
  } else if (currentTab === 'compare') {
    html = renderCompare();
  }

  document.getElementById('mainContent').innerHTML = html;
}

function renderDashboard(s) {
  const pctStr = s.pct.toFixed(0);
  const fillClass = s.tflFail > 0 ? 'mixed' : 'all-pass';
  return `
    <div class="stat-cards">
      <div class="stat-card blue"><div class="card-label">TFLs Validated</div><div class="card-num">${s.total}</div><div class="card-sub">Primary Analysis</div></div>
      <div class="stat-card green"><div class="card-label">Passed</div><div class="card-num">${s.tflPass}</div><div class="card-sub">All checks matched</div></div>
      <div class="stat-card ${s.tflFail>0?'red':'green'}"><div class="card-label">Failed</div><div class="card-num">${s.tflFail}</div><div class="card-sub">Mismatches found</div></div>
      <div class="stat-card blue"><div class="card-label">Total Checks</div><div class="card-num">${s.totalChecks}</div><div class="card-sub">Individual comparisons</div></div>
      <div class="stat-card green"><div class="card-label">Checks Passed</div><div class="card-num">${s.totalPass}</div><div class="card-sub">${s.totalPass}/${s.totalChecks}</div></div>
      <div class="stat-card ${s.tflFail>0?'red':'green'}"><div class="card-label">Checks Failed</div><div class="card-num">${s.totalChecks - s.totalPass}</div><div class="card-sub">Require review</div></div>
    </div>
    <div class="progress-section">
      <div class="progress-header"><h3>Validation Pass Rate</h3><span class="progress-pct">${pctStr}%</span></div>
      <div class="progress-track"><div class="progress-fill ${fillClass}" style="width:${pctStr}%">${pctStr}%</div></div>
      <div class="progress-legend">
        <div class="legend-item"><span class="legend-dot green"></span>Passed</div>
        <div class="legend-item"><span class="legend-dot red"></span>Failed</div>
      </div>
    </div>
    <div class="section-title"><span class="icon">📋</span>All TFL Results</div>
    ${buildTable(s.results)}
  `;
}

function renderResultsTable(items, title) {
  return `<div class="section-title"><span class="icon">📋</span>${title}</div>${buildTable(items)}`;
}

function buildTable(items) {
  // Determine dataset for each item
  const dsMap = {demographics:'ADSL',disposition:'ADSL',safety_ae:'ADAE',safety_ae_grade:'ADAE',safety_sae:'ADAE',
    listing:'—',lab_summary:'ADLB',vitals_summary:'ADVS',exposure:'ADSL',conmeds:'ADCM',medhist:'ADMH'};
  let rows = items.map(r => {
    const ds = dsMap[r.vtype] || '—';
    const isFail = r.status !== 'PASS';
    const rate = r.total > 0 ? (r.passed/r.total*100).toFixed(1) : '—';
    const rateClass = rate === '100.0' ? 'full' : 'partial';
    const typeLabel = r.id.startsWith('L-') ? 'Listing' : 'Table';
    const expanded = expandedRow === r.id;
    let html = `<tr class="${isFail?'fail':''}" onclick="toggleRow('${r.id}')">
      <td>${r.id}</td>
      <td><span class="type-badge">${typeLabel}</span></td>
      <td>${r.title}</td>
      <td><span class="ds-badge">${ds}</span></td>
      <td><span class="status-badge ${r.status.toLowerCase()}"><span class="dot"></span>${r.status === 'PASS' ? '✓ PASSED' : '✗ FAILED'}</span></td>
      <td class="checks-text"><span>${r.passed}/${r.total}</span></td>
      <td class="match-rate ${rateClass}">${rate}%</td>
    </tr>`;
    // Detail row
    html += `<tr class="detail-row${expanded?' open':''}"><td colspan="7"><div class="detail-inner">`;
    if (r.details && r.details.length > 0) {
      html += '<div class="detail-grid">';
      r.details.forEach(d => {
        const cls = d.match ? 'pass' : 'fail';
        const icon = d.match ? '✓' : '✗';
        html += `<div class="detail-item ${cls}"><span class="d-label" title="${d.label}">${d.label}</span><span class="d-vals">${icon} TFL=${d.tfl||'None'} | Calc=${d.calc||'None'}</span></div>`;
      });
      html += '</div>';
      if (r.details.length < r.total) html += `<div class="detail-note">Showing ${r.details.length} of ${r.total} checks. Full details in Excel report.</div>`;
    } else {
      html += '<div class="detail-note">Click to expand. Detailed checks available in Excel report.</div>';
    }
    html += '</div></td></tr>';
    return html;
  }).join('');

  return `<table class="results-table">
    <thead><tr><th>TFL ID</th><th>Type</th><th>Title</th><th>Dataset</th><th>Status</th><th>Checks</th><th>Match Rate</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderAudit(s) {
  let entries = [];
  s.results.forEach(r => {
    entries.push({time:'00:00:01',msg:`[${r.id}] Loaded dataset and parsed TFL shell (${r.vtype})`});
    entries.push({time:'00:00:02',msg:`[${r.id}] Computed ${r.total} statistical comparisons`});
    entries.push({time:'00:00:03',msg:`[${r.id}] Result: ${r.status} — ${r.passed}/${r.total} checks passed`});
  });
  entries.push({time:'00:00:04',msg:`Validation complete. ${s.tflPass}/${s.total} TFLs passed, ${s.totalPass}/${s.totalChecks} checks matched.`});

  return `<div class="section-title"><span class="icon">📁</span>Audit Trail (${entries.length} entries)</div>
    <div class="audit-panel">${entries.map(e => `<div class="audit-entry"><div class="a-time">${e.time}</div><div class="a-msg">${e.msg}</div></div>`).join('')}</div>`;
}

function renderSpecs(s) {
  const vars = ['USUBJID','TRT01A','SAFFL','AGE','SEX','RACE','AEBODSYS','AEDECOD','AESER','AEREL','TRTEMFL','PARAMCD','AVAL','ABLFL','ANL01FL','MHBODSYS','CMCLAS','TRTDURD'];
  let rows = vars.map(v => `<tr><td style="font-weight:600;font-family:monospace">${v}</td><td>${getVarDesc(v)}</td><td>${getVarDomain(v)}</td></tr>`).join('');
  return `<div class="section-title"><span class="icon">📐</span>ADaM Specifications — Key Variables</div>
    <table class="results-table"><thead><tr><th>Variable</th><th>Description</th><th>Domain</th></tr></thead><tbody>${rows}</tbody></table>`;
}
